<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <base href="/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <meta name="theme-color" content="#141517" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="author" content="Quzzar" />
    <link rel="apple-touch-icon" sizes="180X180" href="./public/apple-icon-180.png" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta
      name="keywords"
      content="pathfinder, starfinder, ttrpg, aon 2e, rpg, character, dnd, dungeons and dragons, pf2e, sf2e, aon, aon2e, archives of nethys"
    />
    <meta
      name="description"
      content="A character builder and digital toolbox for Pathfinder and Starfinder Second Edition."
    />

    <title>Wanderer's Guide</title>

    <!-- Warm up the data/image origin (Supabase behind a custom domain) during bundle download
         so the first content/image request doesn't pay a cold handshake. -->
    <link rel="preconnect" href="https://api.wanderersguide.app" crossorigin />
    <link rel="dns-prefetch" href="https://api.wanderersguide.app" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat&family=Ubuntu+Mono&display=swap" rel="stylesheet" />
    <!-- open-dyslexic is an opt-in account setting; it is injected at runtime (see App.tsx)
         only for users who enable it, instead of render-blocking every visitor here. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
