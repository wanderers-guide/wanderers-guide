name: Update schema

on:
  push:
    branches: ['main']
  workflow_dispatch:
  schedule:
    # Weekly, Tuesday 11:00 UTC. This runs a heavy pg_dump against PRODUCTION
    # (secrets.DB_URI) that saturates DB I/O for its duration, so it's kept off both our
    # main audiences' peaks: 11:00 UTC is early-morning in the Americas and late-morning
    # in Europe — well before evening tabletop peak in either region. It previously ran
    # daily at 00:00 UTC (≈ 6-7 PM CST), right at peak. data.sql also refreshes on every
    # push to main, so weekly is plenty.
    # TODO: dump from a read replica or a snapshot instead of live prod to remove the
    # production impact entirely.
    - cron: '0 11 * * 2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LOCAL_DB: postgresql://postgres:postgres@localhost:5432/postgres

jobs:
  dump-database:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - name: Setup postgres
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /etc/apt/trusted.gpg.d/pgdg.asc &>/dev/null
          sudo apt update
          sudo apt install postgresql-client-16 locate -y
      - name: Dump Database
        working-directory: ./data
        env:
          DB_URI: ${{ secrets.DB_URI }}
        run: ./ci-dump.sh $DB_URI
      # Creates a local copy of the data to work on
      - name: Restore local database
        working-directory: ./data
        run: ./create-db.sh ${{ env.LOCAL_DB }}
      - name: Remove user data
        working-directory: ./data
        run: ./clear-user-data.sh ${{ env.LOCAL_DB }}
      - name: Dump clean data
        working-directory: ./data
        run: pg_dump --data-only --table="public.*" ${{ env.LOCAL_DB }} > data.sql
      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '[no ci] Update Schema'
