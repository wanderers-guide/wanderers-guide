name: Update schema

on:
  push:
    branches: ['main']
  workflow_dispatch:
  schedule:
    # Weekly, Tuesday 09:00 UTC — the quietest slot for an Americas + Europe audience:
    # the Americas are mid-sleep (≈04:00 ET / 01:00 PT, clearing the US-West late-night
    # tail even in winter PST) while Europe is in its low weekday-morning lull (≈10:00 CET)
    # before the midday/evening rise. This pg_dump hits PRODUCTION (secrets.DB_URI) and
    # saturates DB I/O while it runs; it previously ran daily at 00:00 UTC (≈ 6-7 PM CST),
    # right at peak. data.sql also refreshes on every push to main, so weekly is plenty.
    # TODO: dump from a read replica or a snapshot instead of live prod to remove the
    # production impact entirely.
    - cron: '0 9 * * 2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LOCAL_DB: postgresql://postgres:postgres@localhost:5432/postgres

jobs:
  dump-database:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - name: Setup postgres
        run: |
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget -qO- https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /etc/apt/trusted.gpg.d/pgdg.asc &>/dev/null
          sudo apt update
          sudo apt install postgresql-client-16 locate -y
      - name: Dump Database
        working-directory: ./data
        env:
          DB_URI: ${{ secrets.DB_URI }}
        run: ./ci-dump.sh $DB_URI
      # Creates a local copy of the data to work on
      - name: Restore local database
        working-directory: ./data
        run: ./create-db.sh ${{ env.LOCAL_DB }}
      - name: Remove user data
        working-directory: ./data
        run: ./clear-user-data.sh ${{ env.LOCAL_DB }}
      - name: Dump clean data
        working-directory: ./data
        run: pg_dump --data-only --table="public.*" ${{ env.LOCAL_DB }} > data.sql
      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '[no ci] Update Schema'
